<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-base" content="https://jmrcapital-func-bxbvbvhsgha3eubj.southafricanorth-01.azurewebsites.net/api">
    <title>JMR Capital · Sign in</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 2rem auto; padding: 1rem; }
        form { display: flex; flex-direction: column; gap: 1rem; }
        input, button { padding: 0.5rem; }
        .toggle { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .toggle button { flex: 1; }
        .login-view, .register-view { display: none; }
        .active { display: block; }
        .error { color: red; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="toggle">
        <button id="showLogin">Sign in</button>
        <button id="showRegister">Create account</button>
    </div>

    <!-- Login Form -->
    <div id="loginView" class="login-view active">
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit">Sign in</button>
        </form>
    </div>

    <!-- Register Form -->
    <div id="registerView" class="register-view">
        <form id="registerForm">
            <input type="text" id="firstName" placeholder="First name" required>
            <input type="text" id="lastName" placeholder="Last name" required>
            <input type="email" id="regEmail" placeholder="Email" required>
            <input type="password" id="regPassword" placeholder="Password" required>
            <input type="password" id="confirmPassword" placeholder="Confirm password" required>
            <button type="submit">Create account</button>
        </form>
    </div>

    <div id="message" class="error"></div>

    <script>
        const API_BASE = document.querySelector('meta[name="api-base"]').getAttribute('content');

        // Toggle views
        const loginView = document.getElementById('loginView');
        const registerView = document.getElementById('registerView');
        document.getElementById('showLogin').onclick = () => {
            loginView.classList.add('active');
            registerView.classList.remove('active');
        };
        document.getElementById('showRegister').onclick = () => {
            registerView.classList.add('active');
            loginView.classList.remove('active');
        };

        // Helper to show messages
        function showMessage(msg, isError = true) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = msg;
            msgDiv.style.color = isError ? 'red' : 'green';
            setTimeout(() => msgDiv.textContent = '', 3000);
        }

        // Register form
        const registerForm = document.getElementById('registerForm');
        console.log('🔍 Register form found?', !!registerForm);

        if (registerForm) {
            registerForm.addEventListener('submit', async (e) => {
                console.log('🔥 Register form submitted!');
                e.preventDefault();

                const firstName = document.getElementById('firstName').value.trim();
                const lastName = document.getElementById('lastName').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const password = document.getElementById('regPassword').value;
                const confirm = document.getElementById('confirmPassword').value;

                if (password !== confirm) {
                    showMessage('Passwords do not match');
                    return;
                }

                const payload = { firstName, lastName, email, password, confirmPassword: confirm };

                try {
                    console.log('📤 Sending to:', `${API_BASE}/auth/register`);
                    console.log('📦 Payload:', payload);
                    const res = await fetch(`${API_BASE}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    console.log('📥 Response status:', res.status);
                    const text = await res.text();
                    console.log('📄 Raw response:', text);
                    let data;
                    try {
                        data = JSON.parse(text);
                    } catch {
                        data = { error: text };
                    }
                    if (!res.ok) {
                        showMessage(data.error || 'Registration failed');
                        return;
                    }
                    localStorage.setItem('token', data.accessToken);
                    localStorage.setItem('refreshToken', data.refreshToken);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } catch (err) {
                    console.error('❌ Network error:', err);
                    showMessage('Network error: ' + err.message);
                }
            });
        } else {
            console.error('❌ Register form NOT found!');
        }

        // Login form
        const loginForm = document.getElementById('loginForm');
        console.log('🔍 Login form found?', !!loginForm);

        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                console.log('🔥 Login form submitted!');
                e.preventDefault();

                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value;

                const payload = { email, password };

                try {
                    console.log('📤 Sending to:', `${API_BASE}/auth/login`);
                    console.log('📦 Payload:', payload);
                    const res = await fetch(`${API_BASE}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    console.log('📥 Response status:', res.status);
                    const text = await res.text();
                    console.log('📄 Raw response:', text);
                    let data;
                    try {
                        data = JSON.parse(text);
                    } catch {
                        data = { error: text };
                    }
                    if (!res.ok) {
                        showMessage(data.error || 'Login failed');
                        return;
                    }
                    localStorage.setItem('token', data.accessToken);
                    localStorage.setItem('refreshToken', data.refreshToken);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } catch (err) {
                    console.error('❌ Network error:', err);
                    showMessage('Network error: ' + err.message);
                }
            });
        } else {
            console.error('❌ Login form NOT found!');
        }
    </script>
</body>
</html>
